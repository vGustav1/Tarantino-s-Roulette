<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estatísticas - Tarantino</title>
    <link rel="stylesheet" href="assets/css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400..900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

    <header class="navbar navbar-expand-lg justify-content-center p-3 display-6">
        <div class="nav">
            <a class="nav-link" href="index.html">Home</a>
            <a class="nav-link" href="filmes.html">Filmes</a>
            <a class="nav-link" href="biografia.html">Biografia</a>
        </div>
    </header>

    <main class="container my-5">
        <h1 class="text-center mb-5 text-uppercase fw-bold text-warning">Estatísticas</h1>
        <div style="max-width: 900px; margin: 0 auto; background: #2c2d34; padding: 20px; border-radius: 10px;">
            <canvas id="graficoNotas"></canvas>
        </div>

        <div class="text-center mt-5">
            <a href="index.html" class="qt-card-btn">← Voltar para a Home</a>
        </div>
    </main>

    <footer class="text-center">
        <p>©️ 2026 - Gustavo Fernandes Vieira</p>
        <p>
            <a href="https://www.linkedin.com/in/gustavovieira21/">LinkedIn</a> |
            <a href="https://github.com/vGustav1">GitHub</a>
        </p>
    </footer>

    <script>
        async function carregarGrafico() {
            try {
                const resposta = await fetch('../db/db.json');
                if (!resposta.ok) throw new Error('Erro ao carregar db.json');
                const dados = await resposta.json();

                const nomesFilmes = dados.filmes.map(filme => filme.nome);
                const notasFilmes = dados.filmes.map(filme =>
                    parseFloat(filme.avaliacao.replace(',', '.'))
                );
                const ctx = document.getElementById('graficoNotas').getContext('2d');
                new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: nomesFilmes,
                        datasets: [{
                            label: 'Nota do Filme',
                            data: notasFilmes,
                            backgroundColor: '#f89d13',
                            borderColor: '#e0890b',
                            borderWidth: 1,
                            borderRadius: 4
                        }]
                    },
                    options: {
                        responsive: true,
                        plugins: {
                            legend: { display: false }
                        },
                        scales: {
                            y: {
                                beginAtZero: true,
                                max: 10,
                                ticks: { color: '#ffffff' },
                                title: {
                                    display: true,
                                    text: 'Notas',
                                    color: '#f89d13',
                                    font: { size: 14, weight: 'bold' }
                                }
                            },
                            x: {
                                ticks: {
                                    color: '#ffffff',
                                    maxRotation: 45,
                                    minRotation: 45
                                }
                            }
                        }
                    }
                });
            } catch (erro) {
                console.error('Erro', erro);
            }
        }
        carregarGrafico();

    </script>

</body>

</html>
