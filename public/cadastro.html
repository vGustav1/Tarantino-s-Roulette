<!DOCTYPE html>
<html lang="en">

<head>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <script defer src="assets/scripts/cadastro.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/cadastro.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">



</head>

<body>

    <div class="container">
        <div class="cadastro form">
            <h1>Primeira vez aqui?</h1>
            <header>Registre-se</header>
            <form id="form-cadastro">
                <input type="text" id="cad-nome" placeholder="Nome" required>
                <input type="text" id="cad-username" placeholder="Username" required>
                <input type="email" id="cad-email" placeholder="Email" required>
                <input type="password" id="cad-senha" placeholder="Senha" required>
                <input type="submit" class="button" value="Cadastrar">
            </form>
            <div class="signup">
                <span class="signup">Já tem uma conta?
                    <a href="login.html">Login</a>
                </span>

            </div>

        </div>
    </div>

</body>

</html>
